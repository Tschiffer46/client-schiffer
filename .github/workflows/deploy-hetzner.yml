# Deploy client-schiffer to Hetzner server (Type B — Docker + GHCR)
#
# Required GitHub Secrets:
#   SERVER_HOST         - Hetzner server IP
#   SERVER_USER         - SSH username (deploy)
#   SERVER_SSH_KEY      - Private SSH key
#   SCHIFFER_DB_PASSWORD - PostgreSQL password for schiffer database

name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/tschiffer46/client-schiffer:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/tschiffer46/client-schiffer:latest
            cd /home/deploy/hosting
            docker compose up -d schiffer
            # Run database migrations using the Prisma version bundled in the container
            docker compose exec -T schiffer node node_modules/prisma/build/index.js db push --accept-data-loss
          ENDSSH
